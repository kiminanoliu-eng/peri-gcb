           data-pt="Sistema flexível de cofragem de lajes com vigas composto por vigas de madeira VT 20K e GT 24. Adapta-se a várias configurações de lajes com espessura máxima de concretagem de 1 metro. O sistema não tem restrições especiais na colocação de vigas primárias/secundárias ou seleção de painéis."
           data-sr="Fleksibilan sistem gredne oplate ploča koji se sastoji od drvenih greda VT 20K i GT 24. Prilagođava se različitim konfiguracijama ploča sa maksimalnom debljinom betoniranja od 1 metar. Sistem nema posebna ograničenja u postavljanju primarnih/sekundarnih greda ili izboru panela."
           data-hu="Rugalmas gerendás födémzsaluzási rendszer VT 20K és GT 24 fagerendákból. Alkalmazkodik különböző födémkonfigurációkhoz, maximum 1 méter betonozási vastagsággal. A rendszernek nincsenek különleges korlátozásai az elsődleges/másodlagos gerenda elhelyezésére vagy panel kiválasztására.">灵活的木梁式楼板模板系统，由VT 20K和GT 24木梁组成。可适应各种楼板造型，最大浇筑厚度1米。系统对主梁、次梁布置位置及模板板材选择无特殊限制。</p>
