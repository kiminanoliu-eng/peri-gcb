           data-pt="GRIDFLEX é um sistema de cofragem de lajes com estrutura de alumínio com módulos leves (apenas 20 kg por módulo padrão) capaz de concretar lajes de até 33 cm de espessura. Os trabalhadores podem caminhar com segurança sobre a superfície da estrutura montada."
           data-sr="GRIDFLEX je aluminijumski ramni sistem oplate ploča sa lakim modulima (samo 20 kg po standardnom modulu) sposoban za betoniranje ploča do 33 cm debljine. Radnici mogu bezbedno hodati po montiranoj površini rama."
           data-hu="A GRIDFLEX egy alumínium keretes födémzsaluzási rendszer könnyű modulokkal (csak 20 kg standard modulonként), amely akár 33 cm vastag födémek betonozására képes. A munkások biztonságosan járhatnak az összeszerelt keret felületén.">GRIDFLEX是一款铝制框架楼板模板系统，具有轻质模块（每个标准模块仅20公斤）、可浇筑最大33厘米厚的楼板。施工人员可在立架好的框架平面上安全行走。</p>
